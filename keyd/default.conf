# Managed by fedora-bootstrap. Recreates a Mac keyboard's bottom row so the
# key next to the spacebar behaves like Cmd.
#
# Physical bottom-left on this PC keyboard:  Ctrl | Super(meta) | Alt | Space
# We swap Super<->Alt so the FUNCTION order:  Ctrl | Alt | Super | Space
# which matches a Mac:                         Ctrl | Option | Cmd | Space
# => the thumb key right next to the spacebar is now Super (your "Cmd").
#
# Then, while that Super (thumb) key is held:
#   Super + C / V / X = Copy / Paste / Cut   (like Cmd+C/V/X)
#   Super + T         = new tab in Ptyxis / most terminals (Ctrl+Shift+T)
# Tapping Super alone still opens the GNOME Activities overview.
#
# Caveat: inside a terminal, Super+C becomes Ctrl+C = interrupt (standard
# Linux). Copy/paste in the terminal is Ctrl+Shift+C / Ctrl+Shift+V.
#
# To revert: delete this file (or comment the lines) and `sudo keyd reload`.

[ids]
*

[main]
# Swap the Windows key and Alt so the thumb key (next to space) becomes Super.
leftmeta = leftalt
leftalt  = leftmeta

[meta]
# Held = the new Super (thumb) key. Each maps a Mac chord to its Linux equivalent.
c = C-c
v = C-v
x = C-x
# new tab in Ptyxis and most terminals
t = C-S-t
# close current tab/window (Cmd+W on Mac)
w = C-w
# focus the address/location bar (Cmd+L on Mac). Frees Super+L from lock screen.
l = C-l
# select all (Cmd+A on Mac). Overrides GNOME's "show all apps" on Super+A.
a = C-a
# quit the current app (Cmd+Q on Mac). NOTE: because Super+Q is now "quit",
# the lock-screen shortcut is moved to Super+Escape via gsettings (a letter key
# in this layer can't also be part of a Ctrl+Super+<letter> combo).
q = C-q
