# Managed by fedora-bootstrap. Application-specific keyd overrides, applied by
# `keyd-application-mapper` ON TOP OF /etc/keyd/default.conf whenever a matching
# window is focused. Lives at ~/.config/keyd/app.conf (copied there by bootstrap).
#
# Why: in a terminal, copy/paste/close/select-all are Ctrl+Shift+* shortcuts,
# and a bare Ctrl+C must stay as "interrupt". So in Ptyxis we make the Super
# (thumb) key emit the terminal's Ctrl+Shift+* shortcuts. Result = true Mac
# behavior: Super+C copies, Super+V pastes, while the real Ctrl+C interrupts.
#
# REQUIRES: your user must be in the `keyd` group, otherwise the app-mapper
# can't reach /run/keyd.socket and these overrides silently do nothing:
#     sudo usermod -aG keyd "$USER"    # then log out / back in
#
# The [section] matches the window CLASS. [*tyxis*] matches Ptyxis no matter how
# GNOME reports it (ptyxis / Ptyxis / org.gnome.Ptyxis). Verify with:
#     keyd-application-mapper -v       # focus Ptyxis, read the printed class

[*tyxis*]

meta.c = C-S-c
meta.v = C-S-v
meta.w = C-S-w
meta.a = C-S-a
